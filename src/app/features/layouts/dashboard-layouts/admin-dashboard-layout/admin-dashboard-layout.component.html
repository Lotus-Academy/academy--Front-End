<div class="min-h-screen bg-slate-50 dark:bg-slate-950 flex transition-colors duration-300">

    @if (isSidebarOpen()) {
    <div (click)="closeSidebar()"
        class="fixed inset-0 z-30 bg-slate-900/60 backdrop-blur-sm lg:hidden transition-opacity"></div>
    }

    <aside [ngClass]="isSidebarOpen() ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'"
        class="fixed inset-y-0 left-0 z-40 w-64 transform border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 transition-transform duration-300 ease-in-out lg:static lg:h-screen lg:sticky lg:top-0">

        <div class="flex h-full flex-col">
            <div class="h-16 items-center gap-2 border-b border-slate-200 dark:border-slate-800 px-6 flex shrink-0">
                <a routerLink="/" class="flex items-center gap-2">
                    <div
                        class="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-600 shadow-md shadow-indigo-200 dark:shadow-none">
                        <span class="text-sm font-bold text-white">L</span>
                    </div>
                    <span class="font-bold text-lg text-slate-900 dark:text-white tracking-tight">Lotus Academy</span>
                </a>
            </div>

            <div class="px-6 py-5 shrink-0">
                <div
                    class="inline-flex items-center rounded-full bg-blue-50 dark:bg-blue-900/30 px-3 py-1 text-xs font-bold text-blue-600 dark:text-blue-400 uppercase tracking-wider border border-blue-100 dark:border-blue-800">
                    Espace Administrateur
                </div>
            </div>

            <nav class="flex-1 space-y-1 px-4 overflow-y-auto hide-scrollbar">
                @for (link of navLinks; track link.href) {
                <a [routerLink]="link.href"
                    routerLinkActive="bg-indigo-600 text-white shadow-md shadow-indigo-200 dark:shadow-none"
                    [routerLinkActiveOptions]="{exact: link.href === '/dashboard'}" (click)="closeSidebar()"
                    class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium transition-all text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white">
                    <lucide-icon [name]="link.icon" class="h-5 w-5"></lucide-icon>
                    {{ link.label }}
                </a>
                }
            </nav>

            <div class="border-t border-slate-200 dark:border-slate-800 p-4 shrink-0">
                <button (click)="handleSignOut()"
                    class="w-full flex items-center gap-2 justify-center px-4 py-2.5 rounded-xl text-sm font-bold text-red-600 hover:bg-red-50 dark:hover:bg-red-900/10 transition-colors">
                    <lucide-icon [name]="icons.LogOut" class="h-4 w-4"></lucide-icon>
                    Déconnexion
                </button>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">

        <header
            class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 sm:px-6 lg:px-8 z-20 shrink-0 transition-colors">

            <div class="flex items-center gap-4">
                <button (click)="toggleSidebar()"
                    class="lg:hidden p-2 -ml-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                    <lucide-icon [name]="icons.Menu" class="h-6 w-6"></lucide-icon>
                </button>
                <h1 class="text-xl font-bold text-slate-900 dark:text-white hidden sm:block tracking-tight">
                    {{ title }}
                </h1>
            </div>

            <div class="flex items-center gap-2 sm:gap-4">

                <button
                    class="hidden sm:flex items-center gap-1.5 p-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                    <lucide-icon [name]="icons.Globe" class="w-5 h-5"></lucide-icon>
                    <span class="text-sm font-bold">FR</span>
                    <lucide-icon [name]="icons.ChevronDown" class="w-3.5 h-3.5 opacity-70"></lucide-icon>
                </button>

                <button (click)="themeService.toggleTheme()"
                    class="p-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                    @if (themeService.darkMode()) {
                    <lucide-icon [name]="icons.Sun" class="w-5 h-5 text-yellow-500"></lucide-icon>
                    } @else {
                    <lucide-icon [name]="icons.Moon" class="w-5 h-5"></lucide-icon>
                    }
                </button>

                <button
                    class="relative p-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                    <lucide-icon [name]="icons.Bell" class="w-5 h-5"></lucide-icon>
                    @if (unreadNotifications() > 0) {
                    <span
                        class="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-red-500 border-2 border-white dark:border-slate-900 rounded-full"></span>
                    }
                </button>

                <div class="hidden sm:block w-px h-6 bg-slate-200 dark:bg-slate-700 mx-1"></div>

                <button
                    class="flex items-center gap-3 p-1 sm:p-1.5 sm:pr-3 rounded-full sm:rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors border border-transparent hover:border-slate-200 dark:hover:border-slate-700">
                    <div
                        class="h-8 w-8 rounded-full bg-indigo-100 dark:bg-indigo-900/50 flex items-center justify-center text-indigo-600 dark:text-indigo-400 font-bold border border-indigo-200 dark:border-indigo-800 shadow-sm shrink-0">
                        {{ user()?.firstName?.charAt(0) || 'U' }}
                    </div>
                    <div class="hidden sm:block text-left">
                        <p class="text-sm font-bold text-slate-900 dark:text-white leading-tight">{{ user()?.firstName
                            }}</p>
                        <p class="text-[10px] text-slate-500 dark:text-slate-400 font-medium leading-tight">Admin</p>
                    </div>
                    <lucide-icon [name]="icons.ChevronDown"
                        class="hidden sm:block w-4 h-4 text-slate-400"></lucide-icon>
                </button>

            </div>
        </header>

        <main class="flex-1 overflow-y-auto">
            <div class="p-4 sm:p-6 lg:p-8">
                <h1 class="text-2xl font-bold text-slate-900 dark:text-white sm:hidden mb-6">
                    {{ title }}
                </h1>

                <ng-content></ng-content>
            </div>
        </main>

    </div>
</div>

<style>
    .hide-scrollbar::-webkit-scrollbar {
        display: none;
    }

    .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
</style>
