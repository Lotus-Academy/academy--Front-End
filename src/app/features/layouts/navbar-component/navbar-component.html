<header
    class="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md transition-colors duration-300">
    <div class="container mx-auto px-4 h-16 flex items-center justify-between">

        <a routerLink="/" fragment="hero" class="flex items-center gap-2">
            <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-blue-600">
                <span class="text-lg font-bold text-white">L</span>
            </div>
            <span class="text-xl font-bold text-slate-900 dark:text-white">Lotus Academy</span>
        </a>

        <nav class="hidden md:flex items-center gap-1">
            @for (link of navLinks; track link.label) {
            <a [routerLink]="[link.href]" [fragment]="link.fragment"
                routerLinkActive="text-blue-600 bg-blue-50 dark:bg-blue-900/20"
                [routerLinkActiveOptions]="{exact: true}"
                class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                {{ link.label }}
            </a>
            }
        </nav>

        <div class="hidden md:flex items-center gap-3">
            <button
                class="p-2 text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 transition">
                <lucide-icon [name]="icons.Search" class="w-5 h-5"></lucide-icon>
            </button>

            <button
                class="p-2 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition">
                <lucide-icon [name]="icons.Globe" class="w-5 h-5"></lucide-icon>
            </button>

            <button (click)="themeService.toggleTheme()"
                class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:ring-2 hover:ring-blue-500 transition-all">
                @if (themeService.darkMode()) {
                <lucide-icon [name]="icons.Sun" class="w-5 h-5 text-yellow-500"></lucide-icon>
                } @else {
                <lucide-icon [name]="icons.Moon" class="w-5 h-5 text-slate-700"></lucide-icon>
                }
            </button>

            <a routerLink="/login"
                class="px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition">
                Login
            </a>
            <a [routerLink]="['/login']" [queryParams]="{mode: 'signup'}"
                class="px-8 py-2 text-sm font-medium bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-md shadow-blue-200 dark:shadow-none transition">
                Sign up
            </a>
        </div>

        <button (click)="toggleMenu()" class="md:hidden p-2 text-slate-600 dark:text-slate-400">
            <lucide-icon [name]="isMobileMenuOpen ? icons.X : icons.Menu" class="w-6 h-6"></lucide-icon>
        </button>
    </div>

    @if (isMobileMenuOpen) {
    <div
        class="md:hidden border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 p-4 space-y-2 animate-fade-down">
        @for (link of navLinks; track link.label) {
        <a [routerLink]="[link.href]" [fragment]="link.fragment" (click)="isMobileMenuOpen = false"
            class="block px-4 py-3 text-base font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg">
            {{ link.label }}
        </a>
        }
        <div class="pt-4 border-t border-slate-100 dark:border-slate-800 flex flex-col gap-2">
            <a routerLink="/login" (click)="isMobileMenuOpen = false"
                class="w-full py-3 text-center font-medium border border-slate-200 dark:border-slate-700 dark:text-white rounded-lg">Login</a>
            <a [routerLink]="['/login']" [queryParams]="{mode: 'signup'}" (click)="isMobileMenuOpen = false"
                class="w-full py-3 text-center font-medium bg-blue-600 text-white rounded-lg">Sign up</a>
        </div>
    </div>
    }
</header>
