<div class="min-h-screen bg-slate-50 dark:bg-slate-950 flex transition-colors duration-300">
    <aside
        class="hidden lg:flex flex-col w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 sticky top-0 h-screen">
        <div class="p-6 flex items-center gap-3 border-b border-slate-100 dark:border-slate-800">
            <div
                class="h-9 w-9 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-indigo-200 dark:shadow-none">
                L</div>
            <span class="text-xl font-bold text-slate-900 dark:text-white tracking-tight">Lotus Academy</span>
        </div>

        <nav class="flex-1 p-4 space-y-1">
            <div class="px-4 py-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Menu Principal</div>
            @for (link of menuLinks; track link.label) {
            <a [routerLink]="link.path"
                routerLinkActive="bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400"
                class="flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl transition-all font-medium group">
                <lucide-icon [name]="link.icon"
                    class="w-5 h-5 group-hover:scale-110 transition-transform"></lucide-icon>
                {{ link.label }}
            </a>
            }
        </nav>

        <div class="p-4 border-t border-slate-100 dark:border-slate-800 space-y-4">
            <button (click)="themeService.toggleTheme()"
                class="w-full flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all">
                <lucide-icon [name]="themeService.darkMode() ? 'Sun' : 'Moon'" class="w-5 h-5"></lucide-icon>
                {{ themeService.darkMode() ? 'Mode Clair' : 'Mode Sombre' }}
            </button>
            <button
                class="w-full flex items-center gap-3 px-4 py-3 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/10 rounded-xl transition-all font-bold">
                <lucide-icon name="log-out" class="w-5 h-5"></lucide-icon>
                Déconnexion
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
        <header
            class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-6 flex items-center justify-between sticky top-0 z-20">
            <div class="flex items-center gap-4">
                <button (click)="isSidebarOpen = true" class="lg:hidden p-2 text-slate-600 dark:text-slate-400">
                    <lucide-icon name="menu" class="w-6 h-6"></lucide-icon>
                </button>
                <h1 class="text-lg font-bold text-slate-900 dark:text-white">{{ title }}</h1>
            </div>

            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block leading-tight">
                    <p class="text-sm font-bold text-slate-900 dark:text-white">{{ user?.firstName }} {{ user?.lastName
                        }}</p>
                    <p class="text-[10px] font-bold text-indigo-600 dark:text-indigo-400 uppercase">{{ user?.role }}</p>
                </div>
                <div
                    class="h-10 w-10 rounded-full bg-indigo-100 dark:bg-indigo-900/30 flex items-center justify-center text-indigo-600 font-bold border border-indigo-200 dark:border-indigo-800">
                    {{ user?.firstName?.charAt(0) }}
                </div>
            </div>
        </header>

        <main class="p-6 lg:p-8 animate-fade-in">
            <ng-content></ng-content>
        </main>
    </div>
</div>
