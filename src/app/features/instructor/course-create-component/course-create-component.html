<div class="min-h-screen bg-slate-50 dark:bg-slate-950 transition-colors duration-300 py-10 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto">

        <div class="mb-8 animate-fade-in-up">
            <a routerLink="/dashboard"
                class="inline-flex items-center gap-2 text-sm font-medium text-slate-500 hover:text-indigo-600 dark:text-slate-400 dark:hover:text-indigo-400 transition-colors mb-4">
                <lucide-icon [name]="icons.ArrowLeft" class="w-4 h-4"></lucide-icon>
                Retour au Dashboard
            </a>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Initier un nouveau cours</h1>
            <p class="text-slate-600 dark:text-slate-400 mt-2">Définissez les bases. Vous pourrez ajouter les vidéos et
                l'examen à l'étape suivante.</p>
        </div>

        <form [formGroup]="courseForm" (ngSubmit)="onSubmit()"
            class="bg-white dark:bg-slate-900 p-6 sm:p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 space-y-6 animate-fade-in-up">

            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5">Titre du cours
                    *</label>
                <input type="text" formControlName="title" placeholder="Ex: Maîtriser l'Analyse Technique"
                    class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-colors dark:text-white"
                    [ngClass]="isFieldInvalid('title') ? 'border-red-500' : 'border-slate-300 dark:border-slate-700'">
                @if (isFieldInvalid('title')) {
                <p class="text-xs text-red-500 mt-1.5">Le titre est requis (minimum 5 caractères).</p>
                }
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5">Sous-titre (Accroche)
                    *</label>
                <input type="text" formControlName="subtitle" placeholder="Apprenez à trader de A à Z..."
                    class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-colors dark:text-white"
                    [ngClass]="isFieldInvalid('subtitle') ? 'border-red-500' : 'border-slate-300 dark:border-slate-700'">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5">Catégorie *</label>
                    <select formControlName="categoryId"
                        class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-colors dark:text-white appearance-none"
                        [ngClass]="isFieldInvalid('categoryId') ? 'border-red-500' : 'border-slate-300 dark:border-slate-700'">
                        <option value="" disabled selected>Choisir une catégorie</option>
                        @for (cat of categories; track cat.id) {
                        <option [value]="cat.id">{{ cat.name }}</option>
                        }
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5">Niveau *</label>
                    <select formControlName="level"
                        class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-colors dark:text-white appearance-none">
                        <option value="BEGINNER">Débutant</option>
                        <option value="INTERMEDIATE">Intermédiaire</option>
                        <option value="ADVANCED">Avancé</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5">Prix de base (USD)
                        *</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold">$</span>
                        <input type="number" formControlName="price" min="0" step="0.01"
                            class="w-full pl-8 px-4 py-2.5 bg-slate-50 dark:bg-slate-800 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-colors dark:text-white"
                            [ngClass]="isFieldInvalid('price') ? 'border-red-500' : 'border-slate-300 dark:border-slate-700'">
                    </div>
                    <p class="text-xs text-slate-500 dark:text-slate-400 mt-1.5">La conversion dynamique s'appliquera
                        pour les étudiants internationaux.</p>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5">Langue *</label>
                    <select formControlName="language"
                        class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-colors dark:text-white appearance-none">
                        <option value="Français">Français</option>
                        <option value="Anglais">Anglais</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5">Description</label>
                <textarea formControlName="description" rows="5" placeholder="Décrivez les objectifs de votre cours..."
                    class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-colors dark:text-white resize-y"></textarea>
            </div>

            <div
                class="flex flex-col-reverse sm:flex-row justify-end gap-3 pt-6 border-t border-slate-200 dark:border-slate-800">
                <button type="button" routerLink="/dashboard"
                    class="px-6 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-300 font-bold hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    Annuler
                </button>
                <button type="submit" [disabled]="courseForm.invalid || isLoading"
                    class="px-6 py-2.5 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-500/50 disabled:opacity-50 transition-all flex items-center justify-center gap-2">
                    @if (isLoading) {
                    <lucide-icon [name]="icons.Loader2" class="w-5 h-5 animate-spin"></lucide-icon>
                    Création...
                    } @else {
                    <lucide-icon [name]="icons.Save" class="w-5 h-5"></lucide-icon>
                    Sauvegarder et Continuer
                    }
                </button>
            </div>

        </form>
    </div>
</div>
