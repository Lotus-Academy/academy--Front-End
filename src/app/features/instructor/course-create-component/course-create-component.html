<div class="min-h-screen bg-slate-50 dark:bg-ds-black transition-colors duration-300 py-10 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto">

        <div class="mb-8 animate-fade-in-up">
            <a routerLink="/dashboard"
                class="inline-flex items-center gap-2 font-mono text-[10px] uppercase tracking-[0.15em] font-bold text-slate-500 hover:text-lotus dark:text-ds-muted/70 dark:hover:text-lotus transition-colors mb-4">
                <lucide-icon [name]="icons.ArrowLeft" class="w-4 h-4 stroke-[1.5px]"></lucide-icon>
                {{ 'COURSE_EDITOR.SHELL.BACK_TO_DASHBOARD' | translate }}
            </a>
            <h1 class="font-cormorant text-4xl font-bold text-slate-900 dark:text-white">{{ 'COURSE_EDITOR.CREATE.TITLE'
                | translate }}</h1>
            <p class="font-syne text-slate-600 dark:text-ds-muted/70 mt-2">{{ 'COURSE_EDITOR.CREATE.DESC' | translate }}
            </p>
        </div>

        <form [formGroup]="courseForm" (ngSubmit)="onSubmit()"
            class="bg-white dark:bg-ds-surface p-6 sm:p-8 rounded border border-slate-200 dark:border-ds-border shadow-sm space-y-6 animate-fade-in-up">

            <div>
                <label
                    class="block font-mono text-[10px] uppercase tracking-widest font-bold text-slate-700 dark:text-ds-muted/70 mb-2">{{
                    'COURSE_EDITOR.CREATE.FORM_TITLE' | translate }}</label>
                <input type="text" formControlName="title"
                    [placeholder]="'COURSE_EDITOR.CREATE.FORM_TITLE_PLACEHOLDER' | translate"
                    class="w-full px-4 py-3 bg-slate-50 dark:bg-ds-black border rounded focus:ring-1 focus:ring-lotus focus:border-lotus focus:outline-none transition-colors dark:text-white font-syne text-sm"
                    [ngClass]="isFieldInvalid('title') ? 'border-red-500' : 'border-slate-300 dark:border-ds-border'">
                @if (isFieldInvalid('title')) {
                <p class="font-mono text-[9px] uppercase tracking-wider text-red-500 mt-1.5">{{
                    'COURSE_EDITOR.CREATE.ERR_TITLE' | translate }}</p>
                }
            </div>

            <div>
                <label
                    class="block font-mono text-[10px] uppercase tracking-widest font-bold text-slate-700 dark:text-ds-muted/70 mb-2">{{
                    'COURSE_EDITOR.CREATE.FORM_SUBTITLE' | translate }}</label>
                <input type="text" formControlName="subtitle"
                    [placeholder]="'COURSE_EDITOR.CREATE.FORM_SUBTITLE_PLACEHOLDER' | translate"
                    class="w-full px-4 py-3 bg-slate-50 dark:bg-ds-black border rounded focus:ring-1 focus:ring-lotus focus:border-lotus focus:outline-none transition-colors dark:text-white font-syne text-sm"
                    [ngClass]="isFieldInvalid('subtitle') ? 'border-red-500' : 'border-slate-300 dark:border-ds-border'">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label
                        class="block font-mono text-[10px] uppercase tracking-widest font-bold text-slate-700 dark:text-ds-muted/70 mb-2">{{
                        'COURSE_EDITOR.CREATE.FORM_CATEGORY' | translate }}</label>
                    <select formControlName="categoryId"
                        class="w-full px-4 py-3 bg-slate-50 dark:bg-ds-black border rounded focus:ring-1 focus:ring-lotus focus:border-lotus focus:outline-none transition-colors dark:text-white font-syne text-sm appearance-none"
                        [ngClass]="isFieldInvalid('categoryId') ? 'border-red-500' : 'border-slate-300 dark:border-ds-border'">
                        <option value="" disabled selected>{{ 'COURSE_EDITOR.CREATE.CAT_PLACEHOLDER' | translate }}
                        </option>
                        @for (cat of categories; track cat.id) {
                        <option [value]="cat.id">{{ cat.name }}</option>
                        }
                    </select>
                </div>

                <div>
                    <label
                        class="block font-mono text-[10px] uppercase tracking-widest font-bold text-slate-700 dark:text-ds-muted/70 mb-2">{{
                        'COURSE_EDITOR.CREATE.FORM_LEVEL' | translate }}</label>
                    <select formControlName="level"
                        class="w-full px-4 py-3 bg-slate-50 dark:bg-ds-black border border-slate-300 dark:border-ds-border rounded focus:ring-1 focus:ring-lotus focus:border-lotus focus:outline-none transition-colors dark:text-white font-syne text-sm appearance-none">
                        <option value="BEGINNER">{{ 'COURSE_EDITOR.CREATE.LEVEL_BEGINNER' | translate }}</option>
                        <option value="INTERMEDIATE">{{ 'COURSE_EDITOR.CREATE.LEVEL_INTERMEDIATE' | translate }}
                        </option>
                        <option value="ADVANCED">{{ 'COURSE_EDITOR.CREATE.LEVEL_ADVANCED' | translate }}</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label
                        class="block font-mono text-[10px] uppercase tracking-widest font-bold text-slate-700 dark:text-ds-muted/70 mb-2">{{
                        'COURSE_EDITOR.CREATE.FORM_PRICE' | translate }}</label>
                    <div class="relative">
                        <span
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 dark:text-ds-muted font-bold">$</span>
                        <input type="number" formControlName="price" min="0" step="0.01"
                            class="w-full pl-8 px-4 py-3 bg-slate-50 dark:bg-ds-black border rounded focus:ring-1 focus:ring-lotus focus:border-lotus focus:outline-none transition-colors dark:text-white font-syne text-sm"
                            [ngClass]="isFieldInvalid('price') ? 'border-red-500' : 'border-slate-300 dark:border-ds-border'">
                    </div>
                    <p class="font-syne text-[11px] text-slate-500 dark:text-ds-muted/50 mt-2">{{
                        'COURSE_EDITOR.CREATE.PRICE_NOTE' | translate }}</p>
                </div>

                <div>
                    <label
                        class="block font-mono text-[10px] uppercase tracking-widest font-bold text-slate-700 dark:text-ds-muted/70 mb-2">{{
                        'COURSE_EDITOR.CREATE.FORM_LANG' | translate }}</label>
                    <select formControlName="language"
                        class="w-full px-4 py-3 bg-slate-50 dark:bg-ds-black border border-slate-300 dark:border-ds-border rounded focus:ring-1 focus:ring-lotus focus:border-lotus focus:outline-none transition-colors dark:text-white font-syne text-sm appearance-none">
                        <option value="Français">{{ 'COURSE_EDITOR.CREATE.LANG_FR' | translate }}</option>
                        <option value="Anglais">{{ 'COURSE_EDITOR.CREATE.LANG_EN' | translate }}</option>
                        <option value="Arabe">{{ 'COURSE_EDITOR.CREATE.LANG_AR' | translate }}</option>
                    </select>
                </div>
            </div>

            <div>
                <label
                    class="block font-mono text-[10px] uppercase tracking-widest font-bold text-slate-700 dark:text-ds-muted/70 mb-2">{{
                    'COURSE_EDITOR.CREATE.FORM_DESC' | translate }}</label>
                <textarea formControlName="description" rows="5"
                    [placeholder]="'COURSE_EDITOR.CREATE.DESC_PLACEHOLDER' | translate"
                    class="w-full px-4 py-3 bg-slate-50 dark:bg-ds-black border border-slate-300 dark:border-ds-border rounded focus:ring-1 focus:ring-lotus focus:border-lotus focus:outline-none transition-colors dark:text-white resize-y font-syne text-sm"></textarea>
            </div>

            <div
                class="flex flex-col-reverse sm:flex-row justify-end gap-4 pt-6 border-t border-slate-200 dark:border-ds-border">
                <button type="button" routerLink="/dashboard"
                    class="px-6 py-3 border border-slate-300 dark:border-ds-border rounded font-mono text-[11px] uppercase tracking-widest font-bold text-slate-700 dark:text-ds-muted hover:bg-slate-50 dark:hover:bg-ds-border/50 transition-colors">
                    {{ 'COURSE_EDITOR.CREATE.BTN_CANCEL' | translate }}
                </button>
                <button type="submit" [disabled]="courseForm.invalid || isLoading"
                    class="px-6 py-3 bg-lotus text-ds-black rounded font-mono text-[11px] uppercase tracking-[0.12em] font-bold hover:bg-lotus-light disabled:opacity-50 transition-all flex items-center justify-center gap-2">
                    @if (isLoading) {
                    <lucide-icon [name]="icons.Loader2" class="w-4 h-4 animate-spin"></lucide-icon>
                    {{ 'COURSE_EDITOR.CREATE.BTN_LOADING' | translate }}
                    } @else {
                    <lucide-icon [name]="icons.Save" class="w-4 h-4"></lucide-icon>
                    {{ 'COURSE_EDITOR.CREATE.BTN_SUBMIT' | translate }}
                    }
                </button>
            </div>
        </form>
    </div>
</div>
