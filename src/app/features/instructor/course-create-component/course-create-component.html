<div class="max-w-3xl mx-auto py-10 px-4">

    <div class="mb-8">
        <a routerLink="/dashboard" class="text-sm text-gray-500 hover:text-gray-900 mb-2 inline-block">← Retour au
            Dashboard</a>
        <h1 class="text-3xl font-bold text-gray-900">Créer un nouveau cours</h1>
        <p class="text-gray-600">Commençons par les informations de base.</p>
    </div>

    <form [formGroup]="courseForm" (ngSubmit)="onSubmit()"
        class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 space-y-6">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Titre du cours</label>
            <input type="text" formControlName="title" placeholder="Ex: Maîtriser Angular 17..."
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Sous-titre (Accroche)</label>
            <input type="text" formControlName="subtitle" placeholder="Apprenez à créer des applications..."
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Catégorie</label>
                <select formControlName="categoryId"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
                    <option value="" disabled>Choisir une catégorie</option>
                    @for (cat of categories; track cat.id) {
                    <option [value]="cat.id">{{ cat.name }}</option>
                    }
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Niveau</label>
                <select formControlName="level"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
                    <option value="BEGINNER">Débutant</option>
                    <option value="INTERMEDIATE">Intermédiaire</option>
                    <option value="ADVANCED">Avancé</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Prix (USD/Base)</label>
                <div class="relative">
                    <span class="absolute left-3 top-2 text-gray-500">$</span>
                    <input type="number" formControlName="price"
                        class="w-full pl-8 px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <p class="text-xs text-gray-500 mt-1">Sera converti automatiquement pour les étudiants marocains (x10
                    MAD).</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Langue</label>
                <input type="text" formControlName="language"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea formControlName="description" rows="4"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500"></textarea>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
            <button type="button" routerLink="/dashboard"
                class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50">
                Annuler
            </button>
            <button type="submit" [disabled]="courseForm.invalid || isLoading"
                class="px-6 py-2 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 disabled:opacity-50 flex items-center gap-2">
                @if (isLoading) { <span class="animate-spin">⌛</span> }
                Créer le cours
            </button>
        </div>

    </form>
</div>
