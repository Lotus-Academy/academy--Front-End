<div
    class="bg-white dark:bg-ds-surface border border-slate-200 dark:border-ds-border rounded shadow-sm p-6 sm:p-8 animate-fade-in-up">

    <div class="mb-8">
        <h2 class="font-cormorant text-3xl font-bold text-slate-900 dark:text-white">{{ 'COURSE_EDITOR.BASIC.TITLE' |
            translate }}</h2>
        <p class="font-syne text-sm text-slate-500 dark:text-ds-muted/70 mt-1">{{ 'COURSE_EDITOR.BASIC.DESC' | translate
            }}</p>
    </div>

    @if (isLoading()) {
    <div class="flex justify-center py-12">
        <lucide-icon [name]="icons.Loader2" class="w-8 h-8 text-lotus animate-spin"></lucide-icon>
    </div>
    } @else {
    <form [formGroup]="basicForm" (ngSubmit)="onSave()" class="space-y-6">

        <div>
            <label
                class="block font-mono text-[10px] uppercase tracking-widest font-bold text-slate-700 dark:text-ds-muted/70 mb-2">{{
                'COURSE_EDITOR.CREATE.FORM_TITLE' | translate }}</label>
            <input type="text" formControlName="title"
                class="w-full px-4 py-3 bg-slate-50 dark:bg-ds-black border rounded focus:ring-1 focus:ring-lotus focus:border-lotus focus:outline-none dark:text-white transition-colors font-syne text-sm"
                [ngClass]="isFieldInvalid('title') ? 'border-red-500' : 'border-slate-300 dark:border-ds-border'">
            <p class="font-syne text-[11px] text-slate-500 dark:text-ds-muted/50 mt-2 flex items-center gap-1">
                <lucide-icon [name]="icons.AlertCircle" class="w-3 h-3 text-lotus"></lucide-icon>
                {{ 'COURSE_EDITOR.BASIC.TITLE_NOTE' | translate }}
            </p>
        </div>

        <div>
            <label
                class="block font-mono text-[10px] uppercase tracking-widest font-bold text-slate-700 dark:text-ds-muted/70 mb-2">{{
                'COURSE_EDITOR.CREATE.FORM_SUBTITLE' | translate }}</label>
            <input type="text" formControlName="subtitle"
                class="w-full px-4 py-3 bg-slate-50 dark:bg-ds-black border rounded focus:ring-1 focus:ring-lotus focus:border-lotus focus:outline-none dark:text-white transition-colors font-syne text-sm"
                [ngClass]="isFieldInvalid('subtitle') ? 'border-red-500' : 'border-slate-300 dark:border-ds-border'">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
                <label
                    class="block font-mono text-[10px] uppercase tracking-widest font-bold text-slate-700 dark:text-ds-muted/70 mb-2">{{
                    'COURSE_EDITOR.CREATE.FORM_CATEGORY' | translate }}</label>
                <select formControlName="categoryId"
                    class="w-full px-4 py-3 bg-slate-50 dark:bg-ds-black border rounded focus:ring-1 focus:ring-lotus focus:border-lotus focus:outline-none dark:text-white transition-colors font-syne text-sm appearance-none"
                    [ngClass]="isFieldInvalid('categoryId') ? 'border-red-500' : 'border-slate-300 dark:border-ds-border'">
                    <option value="" disabled selected>{{ 'COURSE_EDITOR.CREATE.CAT_PLACEHOLDER' | translate }}</option>
                    @for (cat of categories(); track cat.id) {
                    <option [value]="cat.id">{{ cat.name }}</option>
                    }
                </select>
            </div>

            <div>
                <label
                    class="block font-mono text-[10px] uppercase tracking-widest font-bold text-slate-700 dark:text-ds-muted/70 mb-2">{{
                    'COURSE_EDITOR.CREATE.FORM_LEVEL' | translate }}</label>
                <select formControlName="level"
                    class="w-full px-4 py-3 bg-slate-50 dark:bg-ds-black border border-slate-300 dark:border-ds-border rounded focus:ring-1 focus:ring-lotus focus:border-lotus focus:outline-none dark:text-white transition-colors font-syne text-sm appearance-none">
                    <option value="BEGINNER">{{ 'COURSE_EDITOR.CREATE.LEVEL_BEGINNER' | translate }}</option>
                    <option value="INTERMEDIATE">{{ 'COURSE_EDITOR.CREATE.LEVEL_INTERMEDIATE' | translate }}</option>
                    <option value="ADVANCED">{{ 'COURSE_EDITOR.CREATE.LEVEL_ADVANCED' | translate }}</option>
                    <option value="ALL_LEVELS">{{ 'COURSE_EDITOR.CREATE.LEVEL_ALL' | translate }}</option>
                </select>
            </div>

            <div>
                <label
                    class="block font-mono text-[10px] uppercase tracking-widest font-bold text-slate-700 dark:text-ds-muted/70 mb-2">{{
                    'COURSE_EDITOR.CREATE.FORM_LANG' | translate }}</label>
                <select formControlName="language"
                    class="w-full px-4 py-3 bg-slate-50 dark:bg-ds-black border border-slate-300 dark:border-ds-border rounded focus:ring-1 focus:ring-lotus focus:border-lotus focus:outline-none dark:text-white transition-colors font-syne text-sm appearance-none">
                    <option value="Français">{{ 'COURSE_EDITOR.CREATE.LANG_FR' | translate }}</option>
                    <option value="Anglais">{{ 'COURSE_EDITOR.CREATE.LANG_EN' | translate }}</option>
                    <option value="Arabe">{{ 'COURSE_EDITOR.CREATE.LANG_AR' | translate }}</option>
                </select>
            </div>
        </div>

        <div>
            <label
                class="block font-mono text-[10px] uppercase tracking-widest font-bold text-slate-700 dark:text-ds-muted/70 mb-2">{{
                'COURSE_EDITOR.CREATE.FORM_DESC' | translate }}</label>
            <textarea formControlName="description" rows="8"
                class="w-full px-4 py-3 bg-slate-50 dark:bg-ds-black border border-slate-300 dark:border-ds-border rounded focus:ring-1 focus:ring-lotus focus:border-lotus focus:outline-none dark:text-white font-syne text-sm resize-y transition-colors"></textarea>
        </div>

        <div class="pt-6 border-t border-slate-200 dark:border-ds-border flex justify-end">
            <button type="submit" [disabled]="basicForm.invalid || isSaving()"
                class="px-6 py-3 bg-lotus text-ds-black font-mono text-[11px] uppercase tracking-[0.12em] font-bold rounded hover:bg-lotus-light disabled:opacity-50 flex items-center gap-2 transition-all">
                @if (isSaving()) {
                <lucide-icon [name]="icons.Loader2" class="w-4 h-4 animate-spin"></lucide-icon>
                {{ 'COURSE_EDITOR.BASIC.BTN_LOADING' | translate }}
                } @else {
                <lucide-icon [name]="icons.Save" class="w-4 h-4"></lucide-icon>
                {{ 'COURSE_EDITOR.BASIC.BTN_SUBMIT' | translate }}
                }
            </button>
        </div>

    </form>
    }
</div>
