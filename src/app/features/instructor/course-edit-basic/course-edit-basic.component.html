<div
    class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-6 sm:p-8 animate-fade-in-up">

    <div class="mb-8">
        <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Informations de base</h2>
        <p class="text-slate-500 dark:text-slate-400 mt-1">Ces informations seront visibles publiquement sur la page de
            présentation de votre cours.</p>
    </div>

    @if (isLoading()) {
    <div class="flex justify-center py-12">
        <div class="w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
    </div>
    } @else {
    <form [formGroup]="basicForm" (ngSubmit)="onSave()" class="space-y-6">

        <div>
            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Titre du cours</label>
            <input type="text" formControlName="title" placeholder="Ex: Maîtriser le Trading Algorithmique"
                class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none dark:text-white transition-colors"
                [ngClass]="isFieldInvalid('title') ? 'border-red-500' : 'border-slate-300 dark:border-slate-700'">
            <p class="text-xs text-slate-500 dark:text-slate-400 mt-1.5 flex items-center gap-1">
                <lucide-icon [name]="icons.AlertCircle" class="w-3.5 h-3.5"></lucide-icon> Un titre accrocheur attire
                plus d'étudiants.
            </p>
        </div>

        <div>
            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Sous-titre (Accroche)</label>
            <input type="text" formControlName="subtitle" placeholder="Apprenez à construire des robots de trading..."
                class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none dark:text-white transition-colors"
                [ngClass]="isFieldInvalid('subtitle') ? 'border-red-500' : 'border-slate-300 dark:border-slate-700'">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Catégorie</label>
                <select formControlName="categoryId"
                    class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none dark:text-white transition-colors appearance-none"
                    [ngClass]="isFieldInvalid('categoryId') ? 'border-red-500' : 'border-slate-300 dark:border-slate-700'">
                    <option value="" disabled selected>Sélectionner</option>
                    @for (cat of categories(); track cat.id) {
                    <option [value]="cat.id">{{ cat.name }}</option>
                    }
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Niveau</label>
                <select formControlName="level"
                    class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none dark:text-white transition-colors appearance-none">
                    <option value="BEGINNER">Débutant</option>
                    <option value="INTERMEDIATE">Intermédiaire</option>
                    <option value="ADVANCED">Avancé</option>
                    <option value="ALL_LEVELS">Tous niveaux</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Langue</label>
                <select formControlName="language"
                    class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none dark:text-white transition-colors appearance-none">
                    <option value="Français">Français</option>
                    <option value="Anglais">Anglais</option>
                    <option value="Arabe">Arabe</option>
                </select>
            </div>
        </div>

        <div>
            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Description détaillée</label>
            <textarea formControlName="description" rows="8"
                placeholder="Détaillez le contenu, les objectifs et les prérequis de votre formation..."
                class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none dark:text-white resize-y transition-colors"></textarea>
        </div>

        <div class="pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end">
            <button type="submit" [disabled]="basicForm.invalid || isSaving()"
                class="px-6 py-2.5 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-500/50 disabled:opacity-50 flex items-center gap-2 transition-all">
                @if (isSaving()) {
                <lucide-icon [name]="icons.Loader2" class="w-5 h-5 animate-spin"></lucide-icon>
                Enregistrement...
                } @else {
                <lucide-icon [name]="icons.Save" class="w-5 h-5"></lucide-icon>
                Enregistrer les modifications
                }
            </button>
        </div>

    </form>
    }
</div>
