<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-6 sm:p-8">

    <div class="mb-8">
        <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Création de l'Examen</h2>
        <p class="text-slate-500 dark:text-slate-400 mt-1">Créez le quiz final que les étudiants devront réussir pour
            obtenir leur certificat.</p>
    </div>

    <div class="space-y-6">
        <div
            class="grid md:grid-cols-2 gap-4 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-800">
            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">Titre du Quiz</label>
                <input type="text" [ngModel]="quizTitle()" (ngModelChange)="quizTitle.set($event)"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 dark:bg-slate-900 dark:border-slate-700">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">Score requis pour réussir
                    (%)</label>
                <input type="number" [ngModel]="passingScore()" (ngModelChange)="passingScore.set($event)" min="1"
                    max="100"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 dark:bg-slate-900 dark:border-slate-700">
            </div>
        </div>

        @for (question of questions(); track $index; let qIndex = $index) {
        <div
            class="border border-indigo-100 dark:border-indigo-900/50 rounded-xl p-6 bg-white dark:bg-slate-900 shadow-sm relative">

            <button (click)="removeQuestion(qIndex)"
                class="absolute top-4 right-4 text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors">
                <lucide-icon [name]="icons.Trash2" class="w-4 h-4"></lucide-icon>
            </button>

            <h4 class="font-bold text-slate-900 dark:text-white mb-4">Question {{ qIndex + 1 }}</h4>

            <input type="text" [(ngModel)]="question.text" placeholder="Posez votre question ici..."
                class="w-full px-4 py-3 mb-6 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 font-medium">

            <div class="space-y-3 pl-4 md:pl-8">
                @for (option of question.options; track $index; let oIndex = $index) {
                <div class="flex items-center gap-3">
                    <button (click)="setCorrectOption(qIndex, oIndex)"
                        [ngClass]="option.isCorrect ? 'text-green-500 bg-green-50 border-green-200' : 'text-slate-300 bg-white border-slate-200'"
                        class="w-8 h-8 rounded-full border-2 flex items-center justify-center shrink-0 transition-colors"
                        title="Marquer comme bonne réponse">
                        @if (option.isCorrect) {
                        <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                        }
                    </button>

                    <input type="text" [(ngModel)]="option.text" placeholder="Réponse possible..."
                        [ngClass]="option.isCorrect ? 'border-green-300 bg-green-50/30' : 'border-slate-200'"
                        class="flex-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 dark:bg-slate-800 dark:border-slate-700">

                    <button (click)="removeOption(qIndex, oIndex)"
                        class="p-2 text-slate-400 hover:text-red-500 transition-colors"
                        [disabled]="question.options.length <= 2">
                        <lucide-icon [name]="icons.Trash2" class="w-4 h-4"></lucide-icon>
                    </button>
                </div>
                }
            </div>

            <button (click)="addOption(qIndex)"
                class="mt-4 ml-4 md:ml-8 text-sm font-bold text-indigo-600 flex items-center gap-1 hover:text-indigo-800">
                <lucide-icon [name]="icons.Plus" class="w-4 h-4"></lucide-icon> Ajouter une option
            </button>
        </div>
        }

        <button (click)="addQuestion()"
            class="w-full py-4 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-xl text-slate-600 font-bold hover:border-indigo-500 hover:text-indigo-600 transition-colors flex justify-center items-center gap-2">
            <lucide-icon [name]="icons.Plus" class="w-5 h-5"></lucide-icon> Nouvelle Question
        </button>

    </div>

    <div class="mt-8 pt-6 border-t border-slate-200 dark:border-slate-800 flex justify-end">
        <button (click)="saveQuiz()" [disabled]="isSaving() || questions().length === 0"
            class="px-6 py-2.5 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 disabled:opacity-50 flex items-center gap-2">
            <lucide-icon [name]="icons.Save" class="w-5 h-5"></lucide-icon>
            Enregistrer l'examen
        </button>
    </div>
</div>
