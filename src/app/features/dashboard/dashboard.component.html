<app-dashboard-layout [title]="dashboardTitle" [user]="user" (logout)="logout()">

    @switch (user?.role) {

    @case ('ADMIN') {
    <app-admin-dashboard />
    }

    @case ('INSTRUCTOR') {
    <app-instructor-dashboard />
    }

    @case ('STUDENT') {
    <app-student-dashboard />
    }

    @default {
    <app-student-dashboard />
    }
    }

</app-dashboard-layout>
