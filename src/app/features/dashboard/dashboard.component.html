@switch (user?.role) {
@case ('ADMIN') {
<app-admin-layout title="Panneau d'Administration">
    <app-admin-dashboard></app-admin-dashboard>
</app-admin-layout>
}
@case ('INSTRUCTOR') {
<app-instructor-layout title="Espace Instructeur">
    <app-instructor-dashboard></app-instructor-dashboard>
</app-instructor-layout>
}
@case ('STUDENT') {
<app-student-layout title="Bienvenue, {{ user?.firstName }} !">
    <app-student-dashboard></app-student-dashboard>
</app-student-layout>
}
}
