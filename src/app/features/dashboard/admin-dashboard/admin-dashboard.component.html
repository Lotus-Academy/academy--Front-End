<div class="space-y-8">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-blue-50 dark:bg-blue-900/30 text-blue-600 rounded-xl">
                    <lucide-icon name="users"></lucide-icon>
                </div>
                <div>
                    <p class="text-2xl font-bold text-slate-900 dark:text-white">1,284</p>
                    <p class="text-sm text-slate-500">Étudiants totaux</p>
                </div>
            </div>
        </div>
    </div>

    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">
        <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
            <h2 class="font-bold text-slate-900 dark:text-white">Approbations en attente</h2>
            <button class="text-indigo-600 text-sm font-bold">Voir tout</button>
        </div>
        <div class="divide-y divide-slate-100 dark:divide-slate-800">
            @for (item of pendingApprovals; track item.id) {
            <div
                class="p-4 flex items-center justify-between hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                <div class="flex items-center gap-4">
                    <div
                        class="h-10 w-10 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center font-bold">
                        {{ item.name.charAt(0) }}
                    </div>
                    <div>
                        <p class="font-bold text-slate-900 dark:text-white">{{ item.name }}</p>
                        <p class="text-xs text-slate-500">{{ item.type }} • Postulé le {{ item.date | date:'dd/MM' }}
                        </p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button
                        class="px-4 py-2 bg-indigo-600 text-white text-xs font-bold rounded-lg hover:bg-indigo-700">Approuver</button>
                    <button
                        class="px-4 py-2 bg-red-50 text-red-600 text-xs font-bold rounded-lg hover:bg-red-100">Rejeter</button>
                </div>
            </div>
            }
        </div>
    </div>
</div>
